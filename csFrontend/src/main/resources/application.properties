server.port=8183
spring.application.name=admin-master-service

# DB (default: hospitalmsa_admin) // [CHANGED]
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:hospitalmsa_admin}?serverTimezone=Asia/Seoul&characterEncoding=utf8
# [CHANGED]
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:1111}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Flyway (Step4: billing/idempotency/state transition migration)
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.locations=classpath:db/migration

logging.level.kr.co.seoulit.his.admin=DEBUG

# JWT (must match IAM)
his.jwt.secret=${HIS_JWT_SECRET:CHANGE_ME_LOCAL_SECRET_CHANGE_ME_LOCAL_SECRET}

# Audit (E-IAM)
iam.audit.enabled=true
iam.audit.base-url=${IAM_BASE_URL:http://localhost:8181}

# Downstream base URLs (optional)
clinical.base-url=${CLINICAL_BASE_URL:http://localhost:8184}
support.base-url=${SUPPORT_BASE_URL:http://localhost:8185}

management.endpoints.web.exposure.include=health,info,metrics

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=admin-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Queue events topic (Support? ??? ??)  # [MODIFIED: ?? ?? ??? ??]
admin.kafka.topic.queue=${ADMIN_QUEUE_TOPIC:psb-project}

# Queue metrics (fallback)
admin.queue.eta.default-minutes=${ADMIN_QUEUE_ETA_DEFAULT_MINUTES:7}

# Topics (Step9)
kafka.topic.clinical-finalorder=${KAFKA_TOPIC_CLINICAL_FINALORDER:clinical.finalorder.v1}
kafka.topic.admin-execution=${KAFKA_TOPIC_ADMIN_EXECUTION:admin.execution.v1}

# Outbox publisher
outbox.publisher.delay-ms=${OUTBOX_PUBLISHER_DELAY_MS:2000}
outbox.publisher.batch-size=${OUTBOX_PUBLISHER_BATCH_SIZE:50}
outbox.publisher.max-retries=${OUTBOX_PUBLISHER_MAX_RETRIES:10}

# 4-service remake note
# This service embeds former masterService domain/controllers under /master/* routes
# Default unified schema for Admin+Master