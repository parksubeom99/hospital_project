# src/main/resources/application.properties
server.port=8181
spring.application.name=iam-service

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:hospitalmsa_iam}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
#spring.datasource.url=jdbc:mysql://db:3306/hospital_iam
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:1111}


# Logging
logging.level.kr.co.seoulit.hospital=DEBUG




his.jwt.secret=${HIS_JWT_SECRET:CHANGE_ME_LOCAL_SECRET_CHANGE_ME_LOCAL_SECRET}


# Audit retention (archive)
audit.retention-days=${AUDIT_RETENTION_DAYS:180}
