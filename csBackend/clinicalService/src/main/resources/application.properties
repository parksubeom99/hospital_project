server.port=8184
spring.application.name=clinical-service

# DB (Local)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:hospitalmsa_clinical}?serverTimezone=Asia/Seoul&characterEncoding=utf8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:1111}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

logging.level.kr.co.seoulit.his.clinical=DEBUG

# JWT (must match IAM)
his.jwt.secret=${HIS_JWT_SECRET:CHANGE_ME_LOCAL_SECRET_CHANGE_ME_LOCAL_SECRET}

# Audit (E-IAM)
iam.audit.enabled=true
iam.audit.base-url=${IAM_BASE_URL:http://localhost:8181}

# Support (C-Support)
support.base-url=${SUPPORT_BASE_URL:http://localhost:8185}

management.endpoints.web.exposure.include=health,info,metrics

# Admin (A-Admin)
admin.base-url=${ADMIN_BASE_URL:http://localhost:8183}

# Kafka (Step9 - Outbox Publisher + Consumer)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=clinical-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all

# Topics
kafka.topic.clinical-finalorder=${KAFKA_TOPIC_CLINICAL_FINALORDER:clinical.finalorder.v1}
kafka.topic.support-execution=${KAFKA_TOPIC_SUPPORT_EXECUTION:support.execution.v1}
kafka.topic.admin-execution=${KAFKA_TOPIC_ADMIN_EXECUTION:admin.execution.v1}

# Outbox publisher
outbox.publisher.delay-ms=${OUTBOX_PUBLISHER_DELAY_MS:2000}
outbox.publisher.batch-size=${OUTBOX_PUBLISHER_BATCH_SIZE:50}
outbox.publisher.max-retries=${OUTBOX_PUBLISHER_MAX_RETRIES:10}
